<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Motion Therapy</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .left-banner {
      width: 60px;
      background-color: #e0e0e0; /* Light gray banner */
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
    }

    .main-content {
      margin-left: 60px; /* Equal to banner width */
      width: calc(100% - 60px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #333;
    }

    .button {
      background-color: orange;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 1rem;
    }

    .disclaimer {
      font-size: 0.9rem;
      color: gray;
    }
  </style>
</head>
<body>
  <div class="left-banner"></div>
  <div class="main-content">
    <h1>Motion Therapy</h1>
    <p>My name is Étienne. I help people regain strength and mobility using simple tools.</p>
    <p>I recommend a tool that helps you recover faster and feel better.</p>
    <a class="button" href="https://www.amazon.ca/dp/B07NXDH9RQ?tag=motiontherapy-20" target="_blank">Go on Amazon</a>
    <p class="disclaimer">As an Amazon Associate, I earn from qualifying purchases.</p>
  </div>
</body>
</html>
