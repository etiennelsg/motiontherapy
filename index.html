<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Motion Therapy</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      background-color: #f4f4f4;
    }

    /* Vertical banner */
    .sidebar {
      width: 60px;
      background-color: #ddd;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
    }

    .sidebar div {
      margin: 20px 0;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-weight: bold;
    }

    /* Main content */
    .main {
      margin-left: 60px;
      width: calc(100% - 60px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      max-width: 600px;
    }

    .btn {
      background-color: orange;
      color: white;
      padding: 15px 30px;
      text-decoration: none;
      font-size: 1.1em;
      border-radius: 8px;
      margin-top: 30px;
      display: inline-block;
    }

    .disclaimer {
      margin-top: 40px;
      font-size: 0.9em;
      color: #666;
      max-width: 500px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div>Strength</div>
    <div>Endurance</div>
    <div>Flexibility</div>
    <div>Mobility</div>
    <div>Stability</div>
    <div>Recovery</div>
    <div>Balance</div>
    <div>Power</div>
    <div>Breathing</div>
  </div>
  <div class="main">
    <h1>Motion Therapy</h1>
    <p>My name is Étienne. I help people regain strength and mobility using simple tools.</p>
    <a class="btn" href="https://www.amazon.ca/dp/B07NXDH9RQ?tag=motiontherapy-20" target="_blank">Go on Amazon</a>
    <p class="disclaimer">As an Amazon Associate, I earn from qualifying purchases.</p>
  </div>
</body>
</html>
